    function showNotification(msg, type = 'success') {
        const toast = document.getElementById('notificationToast');

  async function uploadToR2(file, path) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
            try {
                const base64 = reader.result.split(',')[1];
                const binary = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                
                // Encode the path properly
                const encodedPath = path.split('/').map(part => encodeURIComponent(part)).join('/');
                const url = `${R2_ENDPOINT}/${encodedPath}`;
                
                console.log('Uploading to:', url);
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Basic ' + btoa(`${R2_KEY}:${R2_SECRET}`),
                        'Content-Type': file.type || 'application/octet-stream'
                    },
                    body: binary
                });
                
                if (response.ok) {
                    const publicUrl = `${R2_PUBLIC}/${encodedPath}`;
                    console.log('Upload successful:', publicUrl);
                    resolve(publicUrl);
                } else {
                    const errorText = await response.text();
                    console.error('Upload failed:', response.status, errorText);
                    reject(new Error(`HTTP ${response.status}: ${errorText}`));
                }
            } catch (error) {
                console.error('Upload error:', error);
                reject(error);
            }
        }; 
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
    });
}

// Sanitize filename function
function sanitizeFilename(filename) {
    // Remove special characters and replace spaces
    return filename
        .replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FFa-zA-Z0-9.-]/g, '_') // Keep Arabic/English letters
        .replace(/\s+/g, '_')
        .replace(/_{2,}/g, '_')
        .substring(0, 200); // Limit length
}

    async function loadContent(search = '') {
        const grid = document.getElementById('contentGrid');

            vSnap.forEach(d => items.push({...d.data(), id:d.id, type:'video', time: d.data().timestamp?.seconds||0}));

                showNotification(`✅ تمت إضافة ${customKey} للشهيد`);
            } else {
                await db.collection('martyrs').doc(id).update({ [act]: firebase.firestore.FieldValue.increment(1) });
                showNotification('✅ تقبل الله عملك وأهدي للشهيد');
            }
        };
    }
    async function openQuranAdvanced(martyrId) {
        const doc = await db.collection('martyrs').doc(martyrId).get();
        const partsObj = doc.data()?.quranParts || {};
        const container = document.getElementById('quranPartsGrid');
        container.innerHTML = '';
        for(let i=1;i<=30;i++) {
            const partDiv = document.createElement('div'); partDiv.className='quran-part';
            let status = partsObj[i] === true ? 'done' : (partsObj[i] === 'taken' ? 'taken' : 'available');
            partDiv.classList.add(status);
            partDiv.innerHTML = `<div style="font-weight:800;">الجزء ${i}</div>`;
            const btnWrap = document.createElement('div'); btnWrap.className='part-buttons';
            if(status === 'available') {
                const takeBtn = document.createElement('button'); takeBtn.textContent = '📖 اختر الجزء'; takeBtn.className='mini-btn take-btn';
                takeBtn.onclick = async (e) => { e.stopPropagation(); await takePart(i, martyrId, partDiv); };
                btnWrap.appendChild(takeBtn);
            } else if(status === 'taken') {
                const finishBtn = document.createElement('button'); finishBtn.textContent = '✅ أنهيت القراءة'; finishBtn.className='mini-btn finish-btn';
                finishBtn.onclick = async (e) => { e.stopPropagation(); await finishPart(i, martyrId, partDiv); };
                btnWrap.appendChild(finishBtn);
            } else {
                btnWrap.innerHTML = '<span style="background:#ffffff80;padding:2px 8px;border-radius:20px;">✓ مكتمل</span>';
            }
            partDiv.appendChild(btnWrap);
            container.appendChild(partDiv);
        }
        openPanel(document.getElementById('quranPanel'));
    }
    async function takePart(part, martyrId, el) {
        const ref = db.collection('martyrs').doc(martyrId);
        const snap = await ref.get();
        if(snap.data()?.quranParts?.[part]) return showNotification('هذا الجزء غير متاح','error');
        await ref.update({ [`quranParts.${part}`]: 'taken' });
        showNotification(`📖 تم أخذ الجزء ${part}`);
        el.classList.remove('available'); el.classList.add('taken');
        el.querySelector('.part-buttons').innerHTML = '<button class="mini-btn finish-btn">✅ أنهيت القراءة</button>';
        el.querySelector('.finish-btn').onclick = async (e) => { e.stopPropagation(); await finishPart(part, martyrId, el); };
    }
    async function finishPart(part, martyrId, el) {
        const ref = db.collection('martyrs').doc(martyrId);
        const snap = await ref.get();
        if(snap.data()?.quranParts?.[part] !== 'taken') return showNotification('لم يتم أخذ هذا الجزء','error');
        await ref.update({ [`quranParts.${part}`]: true, quran: firebase.firestore.FieldValue.increment(1) });
        el.classList.remove('taken'); el.classList.add('done');
        el.querySelector('.part-buttons').innerHTML = '<span>✓ مكتمل</span>';
        showNotification(`✅ تم إكمال الجزء ${part}`);
    }

    document.getElementById('adminLoginSubmitBtn').onclick = async () => {
        const phone = document.getElementById('adminPhone').value.trim();
        const pass = document.getElementById('adminPass').value.trim();
        if(!phone||!pass) return showNotification('أدخل رقم الهاتف وكلمة المرور','error');
        const q = await db.collection('martyrs').where('adminPhone','==',phone).get();
        if(q.empty) return showNotification('لا يوجد شهيد مسجل بهذا الرقم','error');
        const doc = q.docs[0];
        if(doc.data().adminPass === pass) window.location.href = 'martyr-admin.html?id=' + doc.id;
        else showNotification('كلمة مرور خاطئة','error');
    };
    document.getElementById('reqPhotoUploadArea').addEventListener('click',()=>document.getElementById('reqPhotoFile').click());
    document.getElementById('reqPhotoFile').addEventListener('change',(e)=>{ if(e.target.files[0]){ const r=new FileReader(); r.onload=ev=>document.getElementById('reqPhotoPreview').innerHTML=`<img src="${ev.target.result}" class="preview-img">`; r.readAsDataURL(e.target.files[0]);}});
  document.getElementById('sendRequestBtn').onclick = async () => {
    const name = document.getElementById('reqName').value.trim();
    const phone = document.getElementById('reqPhone').value.trim();
    
    if (!name || !phone) {
        return showNotification('املأ الاسم والهاتف', 'error');
    }
    
    const btn = document.getElementById('sendRequestBtn');
    const originalText = btn.textContent;
    btn.textContent = 'جاري الرفع... 📤';
    btn.disabled = true;
    
    try {
        let photoUrl = '';
        const file = document.getElementById('reqPhotoFile').files[0];
        
        if (file) {
            // Check file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                throw new Error('الصورة كبيرة جداً (الحد الأقصى 5 ميجابايت)');
            }
            
            const timestamp = Date.now();
            const safeFilename = sanitizeFilename(file.name);
            const path = `requests/${timestamp}_${safeFilename}`;
            
            showNotification('جاري رفع الصورة...', 'info');
            photoUrl = await uploadToR2(file, path);
        }
        
        // Save to Firestore
        await db.collection('martyrRequests').add({
            name,
            photo: photoUrl,
            phone,
            status: 'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showNotification('✅ تم إرسال الطلب بنجاح');
        
        // Clear form
        document.getElementById('reqName').value = '';
        document.getElementById('reqPhone').value = '';
        document.getElementById('reqPhotoFile').value = '';
        document.getElementById('reqPhotoPreview').innerHTML = '';
        
        setTimeout(() => {
            closePanel(document.getElementById('requestPanel'));
        }, 1500);
        
    } catch (error) {
        console.error('Error:', error);
        showNotification(`❌ فشل الإرسال: ${error.message}`, 'error');
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
};
    document.getElementById('closeSidebar').onclick = () => closePanel(document.getElementById('sidebarPanel'));
    document.getElementById('backFromRequest').onclick = () => { closePanel(document.getElementById('requestPanel')); openPanel(document.getElementById('sidebarPanel')); };
    document.getElementById('backFromDetail').onclick = () => closePanel(document.getElementById('detailPanel'));
    document.getElementById('backFromQuran').onclick = () => closePanel(document.getElementById('quranPanel'));
    document.getElementById('backFromAdminLogin').onclick = () => { closePanel(document.getElementById('adminLoginPanel')); openPanel(document.getElementById('sidebarPanel')); };
    overlay.onclick = closeAll;
    document.getElementById('menuBtn').onclick = () => openPanel(document.getElementById('sidebarPanel'));
    document.getElementById('requestMartyrBtn').onclick = () => { closePanel(document.getElementById('sidebarPanel')); openPanel(document.getElementById('requestPanel')); };
    document.getElementById('martyrAdminLoginBtn').onclick = () => { closePanel(document.getElementById('sidebarPanel')); openPanel(document.getElementById('adminLoginPanel')); };
    document.getElementById('search').addEventListener('input', e => loadContent(e.target.value));
    loadContent();
</script>
